document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rder }}\">\n                  <sc-if value=\"{{ t.on }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ t.fg }}\" stroke-width=\"3\"><path d=\"M5 12l4.5 4.5L19 7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <sc-if value=\"{{ t.off }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ t.fg }}\" stroke-width=\"2.4\"><path d=\"M12 5v14M5 12h14\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>{{ t.label }}\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- PRIVACY -->\n          <div style=\"margin:24px 16px 0\">\n            <div style=\"font-family:'Saira Condensed',sans-serif;font-weight:700;font-size:17px;color:#f5f5f5;padding:0 2px;margin-bottom:12px\">Privacidad<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px\">\n              <sc-for list=\"{{ privacy }}\" as=\"pv\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ pv.onSelect }}\" style=\"display:flex;align-items:center;gap:13px;width:100%;padding:13px 14px;border-radius:14px;cursor:pointer;text-align:left;background:{{ pv.bg }};border:1px solid {{ pv.border }}\">\n                  <div style=\"width:38px;height:38px;border-radius:11px;background:{{ pv.iconBg }};display:flex;align-items:center;justify-content:center;flex:none\">\n                    <sc-if value=\"{{ pv.isPublic }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ pv.iconColor }}\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                    <sc-if value=\"{{ pv.isFollowers }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ pv.iconColor }}\" stroke-width=\"2\"><circle cx=\"9\" cy=\"8\" r=\"3.5\"><\u002Fcircle><path d=\"M3 20a6 6 0 0 1 12 0M16 5.5a3.5 3.5 0 0 1 0 6.5M17 14a6 6 0 0 1 4 6\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                    <sc-if value=\"{{ pv.isPrivate }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ pv.iconColor }}\" stroke-width=\"2\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-weight:600;font-size:14.5px;color:#f5f5f5\">{{ pv.label }}<\u002Fdiv>\n                    <div style=\"font-size:12px;color:#9a99a2;margin-top:1px\">{{ pv.desc }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:22px;height:22px;border-radius:50%;border:2px solid {{ pv.radioBorder }};display:flex;align-items:center;justify-content:center;flex:none\"><sc-if value=\"{{ pv.on }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"width:11px;height:11px;border-radius:50%;background:#f9a825\"><\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"height:18px\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- STICKY PUBLISH -->\n        <div style=\"position:sticky;bottom:0;z-index:10;padding:12px 16px 30px;background:rgba(24,23,28,.94);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.08)\">\n          <button style=\"width:100%;height:54px;border:none;border-radius:15px;background:#d32f2f;color:#fff;font-family:'Saira',sans-serif;font-weight:700;font-size:16.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 10px 26px rgba(211,47,47,.45)\" style-active=\"filter:brightness(.92)\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\"><path d=\"M3 11l18-8-8 18-2-8-8-2z\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>Publicar ruta<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fx-import>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{}\">\nclass Component extends DCLogic {\n  state = {\n    tags: { curvas: true, montana: true, costa: false, amanecer: false, larga: false },\n    privacy: 'public',\n    pois: [\n      { name: 'Mirador de Santa Catalina', type: 'view', km: 'km 38' },\n      { name: 'Repsol La Hermida', type: 'fuel', km: 'km 52' },\n      { name: 'Mesón El Puente', type: 'food', km: 'km 74' },\n    ],\n  };\n\n  renderVals() {\n    const photos = [\n      { label: 'km 12', sel: true },\n      { label: 'km 38', sel: true },\n      { label: 'km 71', sel: true },\n      { label: 'km 96', sel: false },\n      { label: 'km 128', sel: false },\n    ].map((p) => ({ ...p, unsel: !p.sel }));\n\n    const typeDefs = [\n      { key: 'view', label: 'Mirador' },\n      { key: 'fuel', label: 'Gasolinera' },\n      { key: 'food', label: 'Comida' },\n      { key: 'shop', label: 'Taller' },\n    ];\n    const setPoi = (idx, patch) => this.setState((s) => ({\n      pois: s.pois.map((p, i) => (i === idx ? { ...p, ...patch } : p)),\n    }));\n    const pois = this.state.pois.map((p, idx) => ({\n      name: p.name,\n      km: p.km,\n      nameBorder: 'rgba(249,168,37,.3)',\n      onName: (e) => setPoi(idx, { name: e.target.value }),\n      types: typeDefs.map((t) => {\n        const on = p.type === t.key;\n        return {\n          label: t.label,\n          isView: t.key === 'view', isFuel: t.key === 'fuel', isFood: t.key === 'food', isShop: t.key === 'shop',\n          color: on ? '#f9a825' : '#9a99a2',\n          bg: on ? 'rgba(249,168,37,.14)' : 'rgba(255,255,255,.04)',\n          border: on ? 'rgba(249,168,37,.5)' : 'rgba(255,255,255,.07)',\n          onSelect: () => setPoi(idx, { type: t.key }),\n        };\n      }),\n    }));\n\n    const tagDefs = [['curvas', 'Curvas'], ['montana', 'Montaña'], ['costa', 'Costa'], ['amanecer', 'Amanecer'], ['larga', 'Larga distancia']];\n    const tags = tagDefs.map(([key, label]) => {\n      const on = !!this.state.tags[key];\n      return {\n        label, on, off: !on,\n        bg: on ? '#f9a825' : 'rgba(35,34,41,.92)',\n        fg: on ? '#18171c' : '#cfcdd4',\n        border: on ? '#f9a825' : 'rgba(255,255,255,.1)',\n        onToggle: () => this.setState((s) => ({ tags: { ...s.tags, [key]: !s.tags[key] } })),\n      };\n    });\n\n    const privDefs = [\n      { key: 'public', label: 'Pública', desc: 'Cualquiera puede verla y descubrirla en Explorar' },\n      { key: 'followers', label: 'Solo seguidores', desc: 'Visible únicamente para quienes te siguen' },\n      { key: 'private', label: 'Privada', desc: 'Solo para ti, guardada en tu perfil' },\n    ];\n    const privacy = privDefs.map((p) => {\n      const on = this.state.privacy === p.key;\n      return {\n        label: p.label, desc: p.desc, on,\n        isPublic: p.key === 'public', isFollowers: p.key === 'followers', isPrivate: p.key === 'private',\n        bg: on ? 'rgba(249,168,37,.1)' : '#232229',\n        border: on ? 'rgba(249,168,37,.45)' : 'rgba(255,255,255,.06)',\n        iconBg: on ? 'rgba(249,168,37,.16)' : 'rgba(255,255,255,.06)',\n        iconColor: on ? '#f9a825' : '#9a99a2',\n        radioBorder: on ? '#f9a825' : 'rgba(255,255,255,.2)',\n        onSelect: () => this.setState({ privacy: p.key }),\n      };\n    });\n\n    return { photos, pois, tags, privacy };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
